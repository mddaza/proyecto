
    <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consola de Combate - Artemis</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="constelacion-fondo"></div>

    <div class="command-window active" id="ventana-combate">
        <h2 class="section-title">SIMULADOR DE INTEGRIDAD DE NAVE</h2>
        
        <div class="contenedor-vertical">
            <table class="tabla-vertical" id="consola-interactiva">
                <tr>
                    <th colspan="2" style="text-align: center; color: var(--electric-blue); letter-spacing: 3px;">
                        ESTADO DEL SISTEMA
                    </th>
                </tr>
                <tr>
                    <th>IDENTIFICACIÓN</th>
                    <td id="playerName">Cargando...</td>
                </tr>
                <tr>
                    <th>NIVEL DE ENERGÍA</th>
                    <td id="health" style="font-size: 1.8rem; font-weight: bold; color: #00f2ff; text-shadow: 0 0 10px #00f2ff;">
                        100
                    </td>
                </tr>
                <tr>
                    <td colspan="2" style="text-align: center; padding: 25px;">
                        <div style="display: flex; gap: 15px; justify-content: center;">
                            <button id="shoot" class="btn-registro" style="background: #ff375f; box-shadow: 0 0 15px #ff375f; border: none;">
                                💥 DISPARAR
                            </button>
                            <button id="recoveryHealth" class="btn-registro">
                                💉 RECUPERAR
                            </button>
                        </div>
                    </td>
                </tr>
            </table>
        </div>

        <div style="text-align: center; margin-top: 30px;">
            <a href="index.html" class="btn-back">← VOLVER AL CENTRO DE CONTROL</a>
        </div>
    </div>

    <script>
        // --- TU LÓGICA DE OBJETOS ---
        const jugador = {
            nombre: "PixelHero",
            salud: 100,
            curar: function () {
                if (this.salud < 100) {
                    this.salud += 20;
                    if (this.salud > 100) this.salud = 100;
                }
            },
            lostlife: function(){
                this.salud -= 40;
                if (this.salud < 0) this.salud = 0;
            }
        };

        // --- CONEXIÓN CON LA INTERFAZ ---
        const playerNameDisplay = document.getElementById("playerName");
        const healthDisplay = document.getElementById("health");
        const consola = document.getElementById("consola-interactiva");

        playerNameDisplay.textContent = jugador.nombre;

        function actualizarVista() {
            healthDisplay.textContent = jugador.salud;
            // Alerta visual si la salud es baja
            if(jugador.salud <= 40) {
                healthDisplay.style.color = "#ff375f";
            } else {
                healthDisplay.style.color = "#00f2ff";
            }
        }

        // --- ANIMACIONES ---
        function dispararEfecto() {
            consola.classList.add("shake-animation");
            setTimeout(() => consola.classList.remove("shake-animation"), 400);
        }

        function curarEfecto() {
            consola.classList.add("glow-animation");
            setTimeout(() => consola.classList.remove("glow-animation"), 500);
        }

        // --- EVENTOS DE BOTONES ---
        document.getElementById("shoot").addEventListener("click", function() {
            jugador.lostlife();
            actualizarVista();
            dispararEfecto();
        });

        document.getElementById("recoveryHealth").addEventListener("click", function() {
            jugador.curar();
            actualizarVista();
            curarEfecto();
        });

        actualizarVista();
    </script>
</body>
</html>
