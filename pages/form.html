<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ejercicio 1- Melany Daza</title>
    
     <link rel="stylesheet" href="/../css/style.css">
</head>
<body>
    <div id="registro-mision" class="tab-content">
    <h2 class="section-title">REGISTRO DE NUEVOS CADETES</h2>
    
    <div class="contenedor-vertical">
        <form action="/guardar-registro" method="POST" class="formulario-espacial">
            <table class="tabla-vertical">
                <tr>
                    <th><label for="usuario">NOMBRE DE USUARIO</label></th>
                    <td>
                        <input type="text" id="usuario" name="usuario" placeholder="Ej. Melany_Space">
                    </td>
                </tr>
                
                <tr>
                    <th><label for="clave">CONTRASEÑA</label></th>
                    <td>
                        <input type="password" id="clave" name="clave" placeholder="••••••••">
                    </td>
                </tr>
                
                <tr>
                    <th><label for="fecha_nacimiento">FECHA DE NACIMIENTO</label></th>
                    <td>
                        <input type="date" id="fecha_nacimiento" name="fecha_nacimiento">
                    </td>
                </tr>
                
                <tr>
                    <td colspan="2" style="text-align: center; padding: 25px;">
                        <button type="submit" class="btn-registro">REGISTRARSE EN EL SISTEMA</button>
                    </td>
                </tr>
            </table>
        </form>
    </div>
</div>


<a href="../index.html" class="btn-back">← Volver al Inicio</a>
</body>
</html>
