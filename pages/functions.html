<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funciones</title>

 <link rel="stylesheet" href="/../css/style.css">

   <div id="sistema-funciones" class="tab-content active">
    <h2 class="section-title">TERMINAL DE ACCESO: VERIFICACIÓN DE IDENTIDAD</h2>
    
    <div class="contenedor-vertical">
        <table class="tabla-vertical">
            <tr>
                <th colspan="2" style="text-align: center; color: var(--electric-blue);">PROTOCOLO DE BIENVENIDA</th>
            </tr>
            <tr>
                <th>NOMBRE DEL CADETE</th>
                <td><input type="text" id="inputNombre" placeholder="Ingresa tu nombre..."></td>
            </tr>
            <tr>
                <th>EDAD</th>
                <td><input type="number" id="inputEdadAcceso" placeholder="Ingresa tu edad..."></td>
            </tr>
            <tr>
                <th>ESTADO DE ACCESO</th>
                <td id="statusAcceso" style="font-weight: bold; color: var(--neon-pink);">SISTEMA EN ESPERA...</td>
            </tr>
            <tr>
                <td colspan="2" style="text-align: center; padding: 20px;">
                    <button class="btn-registro" onclick="ejecutarAcceso()">INICIAR VERIFICACIÓN</button>
                </td>
            </tr>
        </table>
    </div>

</head>
