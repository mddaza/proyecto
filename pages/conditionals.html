<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>condicionales</title>
    <link rel="stylesheet" href="/../css/style.css">
</head>
<body>

    <div id="simulador-condicionales" class="tab-content active">
    <h2 class="section-title">SISTEMA DE VERIFICACIÓN LOGÍSTICA</h2>
    
    <div class="contenedor-vertical">
        <table class="tabla-vertical">
            <tr>
                <th colspan="2" style="text-align: center; color: var(--neon-pink);">VERIFICADOR DE RANGO</th>
            </tr>
            <tr>
                <th>ENTRADA DE EDAD</th>
                <td><input type="number" id="inputEdad" placeholder="Ingresa edad..."></td>
            </tr>
            <tr>
                <th>ESTADO</th>
                <td id="resultadoEdad" style="color: var(--electric-blue); font-weight: bold;">Esperando datos...</td>
            </tr>
            <tr>
                <td colspan="2" style="text-align: center;">
                    <button class="btn-registro" onclick="verificarEdad()">PROCESAR EDAD</button>
                </td>
            </tr>
        </table>

        <table class="tabla-vertical">
            <tr>
                <th colspan="2" style="text-align: center; color: var(--neon-pink);">EVALUACIÓN DE DESEMPEÑO</th>
            </tr>
            <tr>
                <th>CALIFICACIÓN</th>
                <td><input type="number" step="0.1" id="inputNota" placeholder="0.0 - 5.0"></td>
            </tr>
            <tr>
                <th>RESULTADO</th>
                <td id="resultadoNota" style="color: var(--electric-blue); font-weight: bold;">Esperando nota...</td>
            </tr>
            <tr>
                <td colspan="2" style="text-align: center;">
                    <button class="btn-registro" onclick="verificarNota()">EVALUAR CADETE</button>
                </td>
            </tr>
        </table>
    </div>
</div>    </script>
<a href="../index.html" class="btn-back">← Volver al Inicio</a>
</body>
</html>
